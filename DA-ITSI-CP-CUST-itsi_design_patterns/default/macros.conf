[idp_format_fields]
definition = | rename # as "MACRO_START_idp_format_fields"\
| appendcols [ | inputlookup idp_tierfield_mapping.csv ]\
| filldown *_map\
| foreach t1 t2 t3 [ eval {<<FIELD>>_map}=<<FIELD>> ]\
| fillnull value="-" system, app, function \
| eval system_app=parent, \
       site=coalesce(site, "-"), \
       tech_type=coalesce(tech, "-"), \
       tag1=printf("group:%s", group), \
       tag2=printf("lob:%s", lob), \
       tag3=printf("system:%s", system), \
       tag4="function:".function, \
       tag5="app:".app,\
       tag6="urg:".child.":".urgency \
| table parent child template_name system function app site type lob group tag* tier system_app type_name tech_type node_type prio* urgency \
| rename # as "MACRO_END_idp_format_fields"
disabled = False
iseval = 0

