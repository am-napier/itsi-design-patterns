[idp_add_service_tags]
definition = ```idp_add_service_tags```\
eval tag1=if(match(service_pattern, "<app>"), "app:".app, null()), \
       tag2=if(match(service_pattern, "<comp>"), "component:".comp, null()), \
       tag3=if(match(service_pattern, "<dc>"), "dc:".dc, null()), \
       tag4=if(match(child_pattern, "<comp> P"), "prio:".prio, null()), \
       tag5="ptn:".pattern, \
       tag6=printf("urg:%s:%s", urgency, child) \
```/idp_add_service_tags```
disabled = False
iseval = 0

[idp_append_leaf_nodes]
definition = ```idp_append_leaf_nodes```\
appendpipe                                        ``` setup templates for services that should have them, ie leaf nodes ```\
    [ where pattern=="simple" OR \
            match(child_pattern, "^P[1-3] <comp>") OR \
            pattern=="infra" AND match(child_pattern, "^Tech-Svcs <comp>") OR\
            pattern=="infra.type" AND match(child_pattern, "^<infra> <comp>") OR\
            pattern=="infra.dc" AND match(child_pattern, "^Tech-Svcs <comp> <dc>") OR\
            pattern=="infra.dc.type" AND match(child_pattern, "^<infra> <dc> <comp>")            \
    ``` copy the child to service, because its in appendpipe this is adding a new line ```\
    | eval tmpl=coalesce(comp_infra_template, infra_template)\
    | lookup app_infra_templates.csv label as tmpl OUTPUT template as infra_type_template\
    | eval infra_template=coalesce(infra_type_template, comp_infra_template, infra_template)\
    | eval service=child, service_pattern=child_pattern, child=null(), child_pattern=null(), \
           template_name=lower(replace(template, "\s+", "_")), \
           template_name=case( isnotnull(prio_match), printf("%s_P%s", template_name, prio_match),   \
                               match(pattern, "simple"), template,                                   \
                               1==1, infra_template),\
            app_component=service ]\
``` clean up and dedup ```\
| where service!=child OR isnull(child) \
| sort template_name \
| fillnull child value="__CLEAN_ME__" \
| dedup service child \
| eval child=if(match(child, "__CLEAN_ME__"), null(), child) \
\
```/idp_append_leaf_nodes```
disabled = False
iseval = 0

[idp_initial_lookups]
definition = ```idp_phase_1```\
 join app max=0 \
    [| inputlookup app_components.csv where inc=1 ] \
``` now we have the 1st normal form for system and app combinations ```\
``` next we need to combine the pattern ```\
| foreach priorities pattern \
    [ eval <<FIELD>>=coalesce(comp_<<FIELD>>, <<FIELD>>) ] \
``` this join expands the output and adds most of the layers needed for a given service ```    \
| join pattern max=0 \
    [| inputlookup itsi_design_patterns.csv \
    | where service!=child \
    | eval pattern=replace(child, "^{|}.*", "")\
    | foreach service, child \
        [ eval <<FIELD>>=replace(<<FIELD>>, "^{[^}]+\}", "")``` strip the pattern marker, ie {infra}```, \
               <<FIELD>>_pattern=<<FIELD>>              ``` store the pattern for later ```] ]\
``` get a list of required KPI priority services ```               \
| rex field=child "^P(?<prio_match>\d) <comp>" \
``` start replacing the tokens into the service and child names ```\
| eval service=replace(service, "<system>", system) \
| foreach service child \
    [ eval <<FIELD>>=replace(<<FIELD>>, "<id>", region), <<FIELD>>=replace(<<FIELD>>, "<app>", app)]\
``` expand out the type field in infra_template if its there ```\
| eval infra_template=split(infra_template, ",") \
| mvexpand infra_template\
```/idp_phase_1```
disabled = False
iseval = 0

