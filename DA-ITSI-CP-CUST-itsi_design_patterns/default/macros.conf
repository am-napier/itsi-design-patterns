[idp_token_replace]
definition = ```idp_token_replace```\
eval funct=if( isnotnull(funct), " ".funct , "")   ``` pads the function name if it exists ```\
| foreach service child                              ``` update the token fields ```\
    [ eval <<FIELD>>=coalesce(replace(<<FIELD>>, "<comp>", component), <<FIELD>>), \
           <<FIELD>>=replace(<<FIELD>>, "\[F\]", funct), \
           <<FIELD>>=replace(<<FIELD>>, "<infra>", infra_template), \
           <<FIELD>>=if(isnull(dc), <<FIELD>>, replace(<<FIELD>>, "<dc>", dc)) ]\
```/idp_token_replace```
disabled = False
iseval = 0

[idp_token_substitution]
definition = | rename # as "MACRO_START_idp_token_substitution"\
| foreach parent child [ \
    | eval <<FIELD>>_pattern=<<FIELD>>,\
           <<FIELD>>=replace(<<FIELD>>, "<group>", group), \
           <<FIELD>>=replace(<<FIELD>>, "<lob>", lob), \
           <<FIELD>>=replace(<<FIELD>>, "<t1>", t1),\
           <<FIELD>>=if(tier IN ("t2", "t3"), replace(<<FIELD>>, "<t2>", t2), <<FIELD>>),\
           <<FIELD>>=if(tier=="t3", replace(<<FIELD>>, "<t3>", t3), <<FIELD>>),\
           <<FIELD>>=replace(<<FIELD>>, "<tiers>", tiers),\
           <<FIELD>>=if(match(tech_kind, "site"), replace(<<FIELD>>, "<site>", site), <<FIELD>>),\
           <<FIELD>>=if(match(tech_kind, "type"), replace(<<FIELD>>, "<type>", tech), <<FIELD>>)\
]\
| rename # as "MACRO_END_idp_token_substitution"
disabled = False
iseval = 0

[idp_get_tiers_and_tech_stack(4)]
args = lookup,group,lob,system
definition = inputlookup $lookup$ where group="$group$" AND lob="$lob$" AND t1="$system$"\
| rename # as "MACRO_START_idp_get_tiers_and_tech_stack"\
| eval tier=case(isnull(t2), "t1", isnull(t3), "t2", 1==1, "t3")\
| eval priority=coalesce(split(priorities, ","), "") | mvexpand priority\
``` get the tiers added, will add a few records for each match as this adds to the tree structure ```\
| appendpipe [| join max=0 tier [ | inputlookup idp_tiers.csv ]]\
| rex field=child "^P(?<prio>\d) .tiers."\
| where isnull(prio) OR prio==priority OR priority==0 AND prio==1\
``` let P0 pass and rewrite the child so its not looking like aP leaf node ```\
| eval child=if(priority==0 AND prio==1, replace(child, "^P1 ", ""), child)\
``` gets the infra structure layers, also adds rows to the tree structure if infrastructure service are needed ```\
| appendpipe [| where isnull(parent) | join max=0 tech_kind [ | inputlookup idp_tech_stack.csv ]]\
| where isnotnull(parent)  ``` drop the rows used to join ```\
``` create the label applied to the services over the <tiers> tag ```\
| eval tiers=case(tier=="t3", printf("%s (%s %s)", t3, t2, t1),\
                  tier=="t2", printf("%s (%s)", t2, t1),\
                  1==1, t1)\
| eval site=split(sites, ",") \
| mvexpand site \
| eval tech=split(tech_stack, ",") \
| mvexpand tech\
| rename # as "MACRO_END_idp_get_tiers_and_tech_stack"
disabled = False
iseval = 0


[idp_get_service_templates]
definition = | rename # as "MACRO_START_idp_get_service_templates"\
``` build the service templates for every child leaf node ```\
| appendpipe [ \
    | stats values(*) as * by child \
    | eval parent=child, child=null()\
    ``` only pass the rows where they a re infrastructure leafs or P 0, 1, 2 or 3 ```\
    ``` note P0s are created with the KPI template on the tier node ```\
    | eval node_type=case(\
                   ``` infra types ```\
                   infra="type.site" AND match(child_pattern, "^<type> <site> <tiers> - <group>$") OR\
                   infra="type"      AND match(child_pattern, "^<type> <tiers> - <group>$") OR\
                   infra="site"      AND match(child_pattern, "^<site> <tiers> - <group>$") OR\
                   infra="basic"     AND match(child_pattern, "^Tech-Svcs <tiers> - <group>$"), "infra-".infra, \
                   ``` KPI prios ```     \
                   match(child_pattern, "^P\d <tiers> - <group>$"), "prio-".prio,\
                   ``` it has no prios ```priority=0 AND prio=1, "no-prio",\
                   1==1, "not_matched")\
            | where node_type!="not_matched"       \
            ``` gets the mapping of template label to template name ```\
            | lookup idp_tech_templates.csv tag as infra_type OUTPUT template as infra_template\
            | eval template_name=case(\
                          ``` priority KPI services ```\
                          match(node_type, "prio-"), printf("%s_P%d", template, prio),  \
                          ``` P0 KPIs, use the original template name ```\
                          match(node_type, "no-prio"), template,\
                          ``` infrastructure ```\
                          1==1, coalesce(infra_template, infra_type))        \
                    ``` remove fields that will cause conflicts later ```       \
                   | fields - child*, urgency, *pattern\
]\
| where NOT parent=child\
| rename # as "MACRO_END_idp_get_service_templates"
disabled = False
iseval = 0

[idp_format_fields]
definition = | rename # as "MACRO_START_idp_format_fields"\
| eval system=t1, \
       app=case(tier=="t1", t1, tier=="t2", t2, 1==1, t3),\
       type_name="system_app", \
       system_app=parent,\
       function=if(tier=="t3", t2, "-"), \
       site=coalesce(site, "-"), \
       tech_type=coalesce(infra_type, "-"),\
       tag1=printf("group:%s", group), \
       tag2=printf("lob:%s", lob), \
       tag3=printf("system:%s", system), \
       tag4="function:".fuction,\
       tag5="app:".app,\
       tag6="urg:".child.":".urgency       \
| table parent child template_name system function app site type lob group tag* tier system_app type_name tech_type node_type prio*\
| rename # as "MACRO_END_idp_format_fields"
disabled = False
iseval = 0

